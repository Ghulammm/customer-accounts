name: CI Build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          pip install flake8 nosetests flask flask_talisman flask_cors
      - name: Linting
        run: flake8 . --count --statistics
      - name: Unit Tests
        run: nosetests
